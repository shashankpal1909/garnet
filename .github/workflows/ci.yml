name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.3'
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Verify Formatting
        run: |
          if [ -n "$(go fmt ./...)" ]; then
            echo "Go code is not formatted. Please run 'go fmt ./...'."
            exit 1
          fi

      - name: Run Unit Tests and Report Coverage
        run: |
          go test -v -coverprofile=coverage.out ./...
          
          # Extract the total coverage percentage
          TOTAL_COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "Total Test Coverage: $TOTAL_COVERAGE%"

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Garnet Image
        run: docker build -t garnet:latest .
